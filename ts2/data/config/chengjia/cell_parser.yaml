infra:
  seed: 1000
data:
  set: he
  parser:
    which: CellCSVParser
    cache_root: ./data/
    level: cell #slide
    params:
      common:
        data_root: /nfs/turbo/umms-tocho-snr/exp/chengjia/scsrh_repl_root2/
        patch_data_root: /nfs/turbo/umms-tocho/root_srh_db/
        patch_seg_model: 03207B00
        slide_cell_thres: null
        cell_filter_params: 
          exclude_edge: True
          exclude_edge_check_pixel_values: True
          confidence_threshold: 0.5
          class_filter: ["nuclei", "macrophage"]
        primary_label_idx: 0
        use_patch_code_as_label: True
        slide_cell_thres: 10
      train:
        df: /nfs/turbo/umms-tocho/data/data_splits/srh7v1/srh7v1_diagnostic_train.csv
      trainval:
        df: /nfs/turbo/umms-tocho/data/data_splits/srh7v1/srh7v1_diagnostic_test.csv
  transform: null
  dataset: null
  loader: null

infra:
  exp_name: ts2/tcga_usup/ijepa
  log_dir: /nfs/turbo/umms-tocho/exp/renly
  comment: dev
  log_gpu: True
  seed: 1000
data:
  set: he
  parser:
    which: CachedCSVParser
    params:
      cached_parser_file:
        test_databank: /nfs/mm-isilon/brainscans/dropbox/data/tsmeta/tcga_glioma/69ecabd1_patch40_train/
        test: /nfs/mm-isilon/brainscans/dropbox/data/tsmeta/tcga_glioma/69ecabd1_patch40_trainval/
  transform:
    test:
      which: HistologyTransform
      params:
        base_aug_params: {}
        strong_aug_params:
          aug_list:
          - which: resize_always_apply
            params:
              size: 224
          aug_prob: 1
  test_dataset:
      which: PatchDataset
      which_process_read: memmap
      params:
          data_root: /nfs/mm-isilon/brainscans/dropbox/data/root_histology_db/he.plip
          num_transforms: 1
          balance_instance_class: False
      negative_class_index: 1
      classes_reorder: [2,0,1]
      camera_ready_classes: [Astro, GBM, Oligo]
  loader:
    params:
      common:
        pin_memory: False
        persistent_workers: True
        prefetch_factor: 4
        num_workers: auto
      test:
        batch_size: 256
        drop_last: False
        shuffle: False
lightning_module:
  which: IJEPASystem
  params:
    model_hyperparams:
      backbone_cf:
        which: vit_tiny
        params:
          img_size: 224
          patch_size: 16
      pred_params:
        predictor_embed_dim: 192
        depth: 6
testing:
  eval_mode: patch_knn
  save_train_pred: true
  knn:
    do_knn: True
    knn_params:
      batch_size: 1536
      k: 20
      t: 0.07
  tsne:
    interactive: False
    num_patches: [8192]
    which_set: [val]
    embed_images: true
    class_params:
      perplexity: 50
      learning_rate: auto
      init : pca
tune:
  diagonal_items: true
  params:
    testing/ckpt_path:
    - 65651d0a_Jun07-22-03-31_sd1000_ijepa_1000_lr0.02/models/ckpt-epoch49-step19600-loss0.00.ckpt
    - 8f9beb7b_Jun08-08-02-41_sd1000_ijepa_1000_lr0.001_tuneTrue/models/ckpt-epoch49-step9800-loss0.00.ckpt
    - 772a915f_Jun08-12-43-00_sd1000_ijepa_1000_lr0.0005_tuneTrue/models/ckpt-epoch49-step9800-loss0.00.ckpt

    - 8f9beb7b_Jun08-08-02-41_sd1000_ijepa_1000_lr0.001_tuneTrue/models/ckpt-epoch19-step3920-loss0.00.ckpt
    - 772a915f_Jun08-12-43-00_sd1000_ijepa_1000_lr0.0005_tuneTrue/models/ckpt-epoch19-step3920-loss0.00.ckpt


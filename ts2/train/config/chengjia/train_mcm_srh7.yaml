tune:
  diagonal_items: true
  params:
    lightning_module/params/opt_cf/params/lr:
    - 0.001
    - 0.001
    - 0.001
    - 0.001
    - 0.001
    infra/comment:
    - ibot_mcm_patch_64_1000_lr0.001
    - ibot_mcm_patch_73_1000_lr0.001
    - ibot_mcm_patch_82_1000_lr0.001
    - ibot_mcm_patch_91_1000_lr0.001
    - ibot_mcm_patch_100_1000_lr0.001
    lightning_module/params/model_hyperparams/loss_coeff/tile:
    - 0.6
    - 0.7
    - 0.8
    - 0.9
    - 1
    lightning_module/params/model_hyperparams/loss_coeff/patch:
    - 0.4
    - 0.3
    - 0.2
    - 0.1
    - 0

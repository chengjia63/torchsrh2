infra:
  exp_name: TODO
  #exp_name: ts2/committeedistil/debug/vits
  log_dir: /nfs/turbo/umms-tocho-snr/exp/chengjia
  comment: standaloneeval_37
  log_gpu: True
  seed: 1000
  float32_matmul_precision: medium
data:
  set: he
  parser:
    which: CachedCSVParser
    params:
      cached_parser_file:
            test_databank: /nfs/turbo/umms-tocho/code/chengjia/torchsrh2/ts2/data/tsmeta/umbtb_bench/c808f0f1_patch40_train
            test: /nfs/turbo/umms-tocho/code/chengjia/torchsrh2/ts2/data/tsmeta/umbtb_bench/c808f0f1_patch40_valtest
  #transform:
  #  test:
  #    which: HistologyTransform
  #    params:
  #      base_aug_params: {}
  #      strong_aug_params:
  #        aug_list:
  #        - which: resize_always_apply
  #          params:
  #            size: 224
  #        aug_prob: 1
  transform:
    test:
      which: HistologyTransform
      params:
        base_aug_params:
          do_normalize: False
        strong_aug_params:
          aug_list:
          - which: dinov2_normalize_always_apply
            params: {}
          - which: resize_always_apply
            params:
              size: 224
          aug_prob: 1
  test_dataset:
      which: PatchDataset
      which_process_read: memmap
      params:
          data_root: /nfs/mm-isilon/brainscans/dropbox/data/root_histology_db/he.plip
          num_transforms: 1
          balance_instance_class: False
      negative_class_index: 1
      classes_reorder: [0,  1,  2,  3,  4,  5,  6]
      camera_ready_classes: [diffuse_hgg, diffuse_lgg, mening, circum_glioma, mets, embryonal, pseudo]
  loader:
    params:
      common:
        pin_memory: False
        persistent_workers: False
        prefetch_factor: 8
        num_workers: 7
      test:
        batch_size: 256
        drop_last: False
        shuffle: False

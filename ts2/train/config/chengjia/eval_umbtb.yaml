lightning_module:
  which: Dinov2EvalSystem
  params:
    model_hyperparams:
        arch: vit_large
        img_size: 224
        patch_size: 16
        global_pool: "token"
        class_token: True
        block_chunks: 4
        ffn_bias: true
        ffn_layer: "mlp"
        num_register_tokens: 0
        interpolate_antialias: false
        interpolate_offset: 0.1
        layerscale: 1.0e-05
        pretrained_weights: ""
        proj_bias: true
        qkv_bias: true
    pretrained_weights: TODO

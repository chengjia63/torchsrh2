infra:
  exp_name: ts2/he_neuro_dinov2
  log_dir: /nfs/turbo/umms-tocho-snr/exp/chengjia
  comment: dev
  log_gpu: True
  seed: 1000
  float32_matmul_precision: medium
data:
  set: he
  parser:
    which: CachedCSVParser
    params:
      cached_parser_file:
        train: /nfs/turbo/umms-tocho/code/chengjia/torchsrh2/ts2/data/tsmeta/he_neuro/05a18e32_slide_train
        trainval: /nfs/turbo/umms-tocho/code/chengjia/torchsrh2/ts2/data/tsmeta/he_neuro/05a18e32_slide_toy
  transform:
    train:
      which: HistologyTransform
      params:
        base_aug_params:
          do_normalize: False
        strong_aug_params:
          aug_list:
          - which: dinov2_always_apply
            params: ${........dinov2_fair_config.crops}
          aug_prob: 1
    trainval: ${.train}
  dataset:
      which: SingleLevelHierarchicalDatasetDINOV2
      which_process_read: memmap_multi
      params:
        common:
          data_root: /nfs/mm-isilon/brainscans/dropbox/data/root_histology_db/he.plip
          num_transforms: 0
          num_samples: 1
          balance_instance_class: False
        train:
          num_instance_self_replicate: 30
        trainval: {}
ts_wrap_config:
  no_resume: True
dinov2_fair_config:
  dino:
    head_n_prototypes: 131072
    head_bottleneck_dim: 384
  ibot:
    separate_head: true
    head_n_prototypes: 131072
  train:
    batch_size_per_gpu: 32
    centering: sinkhorn_knopp
  student:
    arch: vit_large
    patch_size: 14
    drop_path_rate: 0.4
    ffn_layer: swiglufused
    block_chunks: 4
  teacher:
    momentum_teacher: 0.994
  optim:
    epochs: 500
    weight_decay_end: 0.2
    base_lr: 2.0e-04  # learning rate for a batch size of 1024
    warmup_epochs: 80
    layerwise_decay: 1.0
  crops:
    local_crops_size: 98
tune:
  diagonal_items: true
  params:
    dinov2_fair_config/optim/base_lr:
    - 4.0e-3
    - 1.0e-3

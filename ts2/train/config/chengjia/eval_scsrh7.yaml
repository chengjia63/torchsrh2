lightning_module:
  which: SupConSystem
  params:
    model_hyperparams:
      backbone_cf:
        which: vit_small
        params:
          img_size: 48
          patch_size: 4
          global_pool: "token"
          class_token: True
          init_values: 1.0e-6
      proj_params:
        hidden_layers: [384,384]
        n_out: 384
        activation: relu
        drop: 0
        bias: True

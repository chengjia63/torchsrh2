lightning_module:
  which: SupConSystem
  params:
    model_hyperparams:
      backbone_cf:
        which: vit_base
        params:
          img_size: 48
          patch_size: 4
          global_pool: "token"
          class_token: True
          init_values: 1.0e-6
      proj_params:
        hidden_layers: [768, 768]
        n_out: 768
        activation: relu
        drop: 0
        bias: True
#lightning_module:
#  which: FlattenSystem
#  params: {}
testing:
  eval_mode: knn
  save_train_pred: True
  #eval_predictions: 4cf5a93d_Oct14-23-29-19_sd1000_standaloneeval_37
  knn:
    do_knn: True
    knn_params:
      batch_size: 1536
      k: 20
      t: 0.07
  tsne:
    interactive: True
    num_patches: [4096]
    which_set: [val]
    embed_images: true
    class_params:
      perplexity: 50
      learning_rate: auto
      init : pca
  nn_viz:
    query_set: val
    n_sample: 32
    target_set: val
    exclude_same_patient: True
    k: 40
tune:
  diagonal_items: true
  params:
    data/transform/test/params/base_aug_params/mask_params/how_to_process:
    - rm_background
    - rm_background
    - rm_background
    - small_patch
    - small_patch
    #lightning_module/params/pretrained_weights:
    testing/ckpt_path:
    - 24956279_Oct20-11-37-53_sd1000_rmbg_1000_lr0.001_tune1/models/ckpt-epoch7-step170720-loss0.00.ckpt
    - 03052393_Oct20-11-37-52_sd1000_rmbg_1000_lr0.0001_tune2/models/ckpt-epoch7-step170720-loss0.00.ckpt
    - f70fcbfa_Oct20-20-32-29_sd1000_rmbg_1000_lr0.0000001_tune2/models/ckpt-epoch7-step170720-loss0.00.ckpt
    - be8aa243_Oct20-11-37-52_sd1000_smpt_1000_lr0.001_tune4/models/ckpt-epoch7-step170720-loss0.00.ckpt
    - 4b125263_Oct20-11-37-56_sd1000_smpt_1000_lr0.0001_tune5/models/ckpt-epoch7-step170720-loss0.00.ckpt

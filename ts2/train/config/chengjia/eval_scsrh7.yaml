lightning_module:
  which: MCMSystem
  params:
    model_hyperparams:
      teacher_tile_encoder:
        img_size: [48]
        patch_size: 4
        return_all_tokens: true
      teacher_tile_ibot_head:
        in_dim: 384           #embed_dim,
        out_dim: 1024         #args.out_dim,
        patch_out_dim: 1024   #args.patch_out_dim,
        norm: null            #args.norm_in_head,
        act: gelu             #args.act_in_head,
        shared_head: true     #args
    strict: False
#lightning_module:

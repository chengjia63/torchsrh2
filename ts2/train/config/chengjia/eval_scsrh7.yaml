lightning_module:
  which: MCMSystem
  params:
    model_hyperparams:
      backbone_cf:
        which: vit_small
        params:
          img_size: 48
          patch_size: 4
          global_pool: "token"
          class_token: True
      proj_params:
        hidden_layers: [384]
        n_out: 384
        activation: relu
        drop: 0
        bias: True
    strict: False
#lightning_module:

    which: CellBagDataset # SingleLevelHierarchicalDataset
    which_process_read: cell_memmap
    params:
      common:
        data_root: /nfs/turbo/umms-tocho-snr/exp/chengjia/scsrh_repl_root2/
        num_transforms: 2
      train: 
        normal_p: 0.5
        ncell_mean: 15
        ncell_std: 3 #15

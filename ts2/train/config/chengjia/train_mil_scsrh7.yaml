  loader:
    params:
      common:
        collate_fn:
          which: CellMILCollator
          params: {}
        pin_memory: False
        persistent_workers: True
        prefetch_factor: 12
        num_workers: 7
      train:
        batch_size: 64
        drop_last: True
        shuffle: True
      trainval:
        batch_size: 64
        drop_last: False
        shuffle: False
#      test:
#        batch_size: 64
#        drop_last: False
#        shuffle: False
lightning_module:
  which: CellABMILSystem
  params:
    model_hyperparams:
      backbone:
        img_size: [48]                                                          
        patch_size: 4                                                           
        return_all_tokens: true 
    loss_params: {}
    opt_cf:
      which: adamw
      scale_lr: False #True
      params:
        lr: 0.001
        betas: [0.9, 0.999]
        eps: 1.0e-8
        weight_decay: 0.01
        amsgrad: False
    schd_cf:
      which: cos_linear_warmup
      params:
        num_warmup_steps: 0.1
        num_cycles: 0.5
training:
  resume_checkpoint: null
  #load_backbone:
  #  ckpt_path: /nfs/mm-isilon/brainscans/dropbox/exp/models/uni/vit_large_patch16_224.dinov2.uni_mass100k/pytorch_model.bin
  #  remove_prefix: null
  trainer_params:
    max_epochs: 10
    gradient_clip_val: 0.5
    enable_progress_bar: True
    precision: 'bf16-mixed'
    deterministic: False
  trainval:
    freq:
      interval: 2
      unit: "epoch"

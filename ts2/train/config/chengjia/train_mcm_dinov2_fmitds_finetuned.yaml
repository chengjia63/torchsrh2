infra:
  exp_name: ts2/fmi_hdinov2_tile
  log_dir: /nfs/turbo/umms-tocho-snr/exp/chengjia
  comment: dev
  log_gpu: True
  seed: 1000
  float32_matmul_precision: medium

data:
  set: srh
  parser:
    which: CachedCSVParser
    params:
      cached_parser_file:
        train: /nfs/turbo/umms-tocho/code/chengjia/torchsrh2/ts2/data/tsmeta/srhum/bf99b89c_slide_all
        trainval: /nfs/turbo/umms-tocho/code/chengjia/torchsrh2/ts2/data/tsmeta/srhum/bf99b89c_slide_toy
        #train: /nfs/turbo/umms-tocho/code/chengjia/torchsrh2/ts2/data/tsmeta/srh7v1/7b5f27a8_slide_all
        #trainval: /nfs/turbo/umms-tocho/code/chengjia/torchsrh2/ts2/data/tsmeta/srh7v1/7b5f27a8_slide_toy
        #test_databank: /nfs/turbo/umms-tocho/code/chengjia/torchsrh2/ts2/data/tsmeta/srh7v1/7b5f27a8_slide_train
        #test: /nfs/turbo/umms-tocho/code/chengjia/torchsrh2/ts2/data/tsmeta/srh7v1/7b5f27a8_slide_test
  transform:
    train:
      which: HistologyTransform
      params:
        base_aug_params:
          laser_noise_config: null
          get_third_channel_params:
            mode: three_channels
            subtracted_base: 0.07629394531
          to_uint8: True
        strong_aug_params:
          aug_list:
          - which: dinov2_always_apply
            params: ${........dinov2_fair_config.crops}
          aug_prob: 1
    trainval: ${.train}
  dataset:
    which: SLHSVSingleTileDatasetDINOV2
    which_process_read: memmap_tile
    params:
      common:
        data_root: /nfs/turbo/umms-tocho-snr/data/root_histology_db/srh/
        tile_size: 48
        num_transforms: 0
        num_samples: 1
        num_instance_self_replicate: 1
        #max_hierarchical_replicate: 1
        balance_instance_class: False
      train: {}
      trainval: {}
ts_wrap_config:
  no_resume: True
dinov2_fair_config:
  dino:
    head_n_prototypes: 1024
    head_bottleneck_dim: 384
  ibot:
    separate_head: true
    head_n_prototypes: 1024
  train:
    batch_size_per_gpu: 640 #8
    centering: sinkhorn_knopp
  student:
    arch: vit_small
    patch_size: 4
    drop_path_rate: 0.2 #0.4
    #ffn_layer: swiglufused
    block_chunks: 4
    pretrained_weights:
      how: dinov2_blocks_cls_only
      path: /nfs/mm-isilon/brainscans/dropbox/exp/models/dinov2_github/dinov2_vits14_pretrain.pth
  teacher:
    momentum_teacher: 0.996
  optim:
    epochs: 100
    weight_decay_end: 0.2
    base_lr: 2.0e-04  # learning rate for a batch size of 1024
    warmup_epochs: 10
    patch_embed_lr_mult: 1.0
  crops:
    global_crops_size: 48
    local_crops_size: 20
  evaluation:                                                                   
    eval_period_iterations: 1250 
tune:
  diagonal_items: true
  params:
    dinov2_fair_config/optim/base_lr:
    - 2.0e-4

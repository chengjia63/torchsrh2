infra:
  exp_name: ts2/fmi_hdinov2_tile
  log_dir: /nfs/turbo/umms-tocho-snr/exp/chengjia
  comment: dev
  log_gpu: True
  seed: 1000
  float32_matmul_precision: medium

data:
  set: srh
  parser:
    which: CachedCSVParser
    params:
      cached_parser_file:
        train: /nfs/turbo/umms-tocho/code/chengjia/torchsrh2/ts2/data/tsmeta/srhum/bf99b89c_slide_all
        trainval: /nfs/turbo/umms-tocho/code/chengjia/torchsrh2/ts2/data/tsmeta/srhum/bf99b89c_slide_toy
        #train: /nfs/turbo/umms-tocho/code/chengjia/torchsrh2/ts2/data/tsmeta/srh7v1/7b5f27a8_slide_all
        #trainval: /nfs/turbo/umms-tocho/code/chengjia/torchsrh2/ts2/data/tsmeta/srh7v1/7b5f27a8_slide_toy
        #test_databank: /nfs/turbo/umms-tocho/code/chengjia/torchsrh2/ts2/data/tsmeta/srh7v1/7b5f27a8_slide_train
        #test: /nfs/turbo/umms-tocho/code/chengjia/torchsrh2/ts2/data/tsmeta/srh7v1/7b5f27a8_slide_test
  transform:
    train:
      which: HistologyTransform
      params:
        base_aug_params:
          laser_noise_config: null
          get_third_channel_params:
            mode: three_channels
            subtracted_base: 0.07629394531
          to_uint8: True
        strong_aug_params:
          aug_list:
          - which: center_crop_always_apply
            params:
              size: 288
          - which: tile_dinov2_always_apply
            params:
              tile_height: 48
              tile_width: 48
              global_crops_scale: [0.14, 1.]
              local_crops_scale: [0.05, 0.4]
              local_crops_number: 8 # same as ${........tile_dinov2_fair_config.crops.local_crops_number}
              global_crops_size: 48
              local_crops_size: 20
          aug_prob: 1
    trainval: ${.train}
  dataset:
    which: SLHTileSVDatasetDINOv2
    which_process_read: memmap_multi
    params:
      common:
        data_root: /nfs/turbo/umms-tocho-snr/data/root_histology_db/srh/
        num_transforms: 0
        num_samples: 1
        balance_instance_class: False
      train: {}
      trainval: {}
ts_wrap_config:
  no_resume: True
  which: mcm
tile_dinov2_fair_config:
  dino:
    loss_weight: 1.0
    head_n_prototypes: 1024
    head_bottleneck_dim: 384
    head_nlayers: 3
    head_hidden_dim: 2048
    koleo_loss_weight: 0.1
  ibot:
    loss_weight: 1.0
    mask_sample_probability: 0.5
    mask_ratio_min_max:
    - 0.1
    - 0.5
    separate_head: true
    head_n_prototypes: 1024
    head_bottleneck_dim: 256
    head_nlayers: 3
    head_hidden_dim: 2048
  train:
    centering: sinkhorn_knopp
  student:
    arch: vit_small
    patch_size: 4
    drop_path_rate: 0.3
    layerscale: 1.0e-05
    drop_path_uniform: true
    pretrained_weights: ''
    ffn_layer: swiglufused
    block_chunks: 4
    qkv_bias: true
    proj_bias: true
    ffn_bias: true
    num_register_tokens: 0
    interpolate_antialias: false
    interpolate_offset: 0.1
    pretrained_weights: /nfs/turbo/umms-tocho-snr/exp/chengjia/ts2/fmi_hdinov2_tile/789ec8bc_Apr13-01-37-13_sd1000_dev_tune0/models/eval/training_124999/teacher_checkpoint.pth

  optim:
    patch_embed_lr_mult: 0.2
    layerwise_decay: 1.0 #0.9
  crops:
    global_crops_size: 48
    local_crops_number: 8

patch_dinov2_fair_config:
  dino:
    loss_weight: 1.0
    head_n_prototypes: 1024
    head_bottleneck_dim: 384
    head_nlayers: 3
    head_hidden_dim: 2048
    koleo_loss_weight: 0.1
  ibot:
    loss_weight: 1.0
    mask_sample_probability: 0.5
    mask_ratio_min_max:
    - 0.1
    - 0.5
    separate_head: true
    head_n_prototypes: 1024
    head_bottleneck_dim: 256
    head_nlayers: 3
    head_hidden_dim: 2048
  train:
    centering: sinkhorn_knopp
  student:
    arch: vit_small
    in_chans: 384
    patch_size: 1
    drop_path_rate: 0.3
    layerscale: 1.0e-05
    drop_path_uniform: true
    pretrained_weights: ''
    ffn_layer: swiglufused
    block_chunks: 4
    qkv_bias: true
    proj_bias: true
    ffn_bias: true
    num_register_tokens: 0
    interpolate_antialias: false
    interpolate_offset: 0.1
  optim:
    patch_embed_lr_mult: 0.2
    layerwise_decay: 1.0 #0.9
  crops:
    student_sample_min: 0
    student_sample_max: 10
    teacher_sample_min: 0
    teacher_sample_max: 2
    global_crops_size: 5
    local_crops_size: 2
    global_crops_number: 2
    local_crops_number: 8

dinov2_main_config:
  MODEL:
    WEIGHTS: ""
  optim:
    epochs: 100
    weight_decay: 0.04
    weight_decay_end: 0.4
    base_lr: 0.004  # learning rate for a batch size of 1024
    lr: 0.  # will be set after applying scaling rule
    warmup_epochs: 10
    min_lr: 1.0e-06
    clip_grad: 3.0
    freeze_last_layer_epochs: 1
    scaling_rule: sqrt_wrt_1024
    adamw_beta1: 0.9
    adamw_beta2: 0.999
  evaluation:
    eval_period_iterations: 1250
  train:
    batch_size_per_gpu: 12
    output_dir: null # torchsrh insert
    saveckp_freq: 20
    seed: ${...infra.seed} # torchsrh2 + omegaconf handle outside
    num_workers: 0
    OFFICIAL_EPOCH_LENGTH: 1250
    cache_dataset: true
  teacher: # We are just going to assume the same scheduler for both
    momentum_teacher: 0.999
    final_momentum_teacher: 1
    warmup_teacher_temp: 0.04
    teacher_temp: 0.07
    warmup_teacher_temp_epochs: 30
  crops:
    global_crops_size: ${...tile_dinov2_fair_config.crops.global_crops_size}
  student:
    patch_size: ${...tile_dinov2_fair_config.student.patch_size}
  ibot:
    mask_ratio_min_max: ${...tile_dinov2_fair_config.ibot.mask_ratio_min_max}
    mask_sample_probability: ${...tile_dinov2_fair_config.ibot.mask_sample_probability}
tune:
  diagonal_items: true
  params:
    dinov2_main_config/optim/base_lr:
    - 1.0e-4

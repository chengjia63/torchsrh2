infra:
  exp_name: ts2/scsrh_uni
  log_dir: /nfs/turbo/umms-tocho-snr/exp/chengjia 
  comment: SE
  log_gpu: True
  seed: 1000
  float32_matmul_precision: medium

data:
  set: scsrh
  parser:
    which: CachedCSVParser
    params:
      cached_parser_file:
        test_databank: ../data/tsmeta/scsrh7_patchcode_label/9e8e36e4_cell40_train
        test: ../data/tsmeta/scsrh7_patchcode_label/9e8e36e4_cell40_trainval
  transform:
    test:
      which: HistologyTransform
      params:
        base_aug_params:
          laser_noise_config: null
          get_third_channel_params:
            mode: three_channels
            subtracted_base: 0.07629394531
          mask_params:
            how_to_process: small_patch #rm_background
            bg_fill: [9957.5889, 10057.9795]
          to_uint8: False
        strong_aug_params:
          aug_list:
          - which: center_crop_always_apply
            params:
              size: 48
          aug_prob: 1
  test_dataset:
    which: CellDataset # SingleLevelHierarchicalDataset
    which_process_read: cell_memmap
    params:
      data_root: /nfs/turbo/umms-tocho-snr/exp/chengjia/scsrh_repl_root2/
      num_transforms: 1
      balance_instance_class: False
      tumor_normal_only: True
    classes_reorder: [0, 1]
    camera_ready_classes: [Normal, Tumor]
  loader:
    params:
      common:
        pin_memory: False
        persistent_workers: False
        prefetch_factor: 8
        num_workers: 7
        batch_size: 256
        drop_last: False
        shuffle: False
      test: {}
      test_databank: {}


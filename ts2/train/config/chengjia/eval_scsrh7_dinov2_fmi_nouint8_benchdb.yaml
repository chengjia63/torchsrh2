lightning_module:
  which: Dinov2EvalSystem
  params:
    model_hyperparams:
        arch: vit_small
        img_size: 48
        patch_size: 4
        #global_pool: "token"
        #class_token: True
        block_chunks: 4
        ffn_bias: true
        ffn_layer: swiglufused
        num_register_tokens: 0
        interpolate_antialias: false
        interpolate_offset: 0.1
        layerscale: 1.0e-05
        proj_bias: true
        qkv_bias: true
    pretrained_weights: TODO

testing:
  eval_mode: knn
  save_train_pred: True
  #eval_predictions: 4cf5a93d_Oct14-23-29-19_sd1000_standaloneeval_37
  knn:
    do_knn: True
    knn_params:
      batch_size: 1536
      k: 20
      t: 0.07
  tsne:
    interactive: True
    num_patches: [4096]
    which_set: [val]
    embed_images: true
    class_params:
      perplexity: 50
      learning_rate: auto
      init : pca
  nn_viz:
    query_set: val
    n_sample: 32
    target_set: val
    exclude_same_patient: True
    k: 40

infra:
  exp_name: ts2_scsrh/scsrh_dinov2
  log_dir: /nfs/turbo/umms-tocho-snr/exp/chengjia
  comment: dev
  log_gpu: True
  seed: 1000
  float32_matmul_precision: medium

data:
  set: scsrh
  parser:
    which: CachedCSVParser
    params:
      cached_parser_file:
        train: ../data/tsmeta/srh7v1_sc/55e0deb2_cell_train
        trainval: ../data/tsmeta/srh7v1_sc/55e0deb2_cell_trainval
  transform:
    train:
      which: HistologyTransform
      params:
        base_aug_params:
          laser_noise_config: null
          get_third_channel_params:
            mode: three_channels
            subtracted_base: 0.07629394531
          mask_params:
            how_to_process: rm_background #small_patch
            bg_fill: [9957.5889, 10057.9795]
          to_uint8: True
        strong_aug_params:
          aug_list:
          - which: dinov2_always_apply
            params: ${........dinov2_fair_config.crops}
          aug_prob: 1
    trainval: ${.train}
  dataset:
    which: CellDatasetDINOv2 #CellDataset # SingleLevelHierarchicalDataset
    which_process_read: cell_memmap
    params:
      common:
        data_root: /nfs/turbo/umms-tocho-snr/exp/chengjia/scsrh_repl_root2/
        num_transforms: 0
        #num_samples: 1
        #num_instance_self_replicate: 1
        #max_hierarchical_replicate: 1
        balance_instance_class: False
      train: {}
      trainval: {}
ts_wrap_config:
  no_resume: True
dinov2_fair_config:
  dino:
    head_n_prototypes: 131072
    head_bottleneck_dim: 384
  ibot:
    separate_head: true
    head_n_prototypes: 131072
  train:
    batch_size_per_gpu: 64
    centering: sinkhorn_knopp
  student:
    arch: vit_base
    patch_size: 4
    drop_path_rate: 0.4
    ffn_layer: swiglufused
    block_chunks: 4
  teacher:
    momentum_teacher: 0.994
  optim:
    epochs: 100
    weight_decay_end: 0.2
    base_lr: 2.0e-04  # learning rate for a batch size of 1024
    warmup_epochs: 10
    layerwise_decay: 1.0
  crops:
    global_crops_size: 48
    local_crops_size: 20
tune:
  diagonal_items: true
  params:
    infra/comment:
    - smallpatch_lr1e-3
    - smallpatch_lr5e-4
    - smallpatch_lr1e-4
    - rmbg_lr1e-4
    dinov2_fair_config/optim/base_lr:
    - 1.0e-3
    - 5.0e-4
    - 1.0e-4
    - 1.0e-4

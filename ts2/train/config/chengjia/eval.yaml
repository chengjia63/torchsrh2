testing:
  eval_mode: patch_knn
  save_train_pred: true
  #eval_predictions
  knn:
    do_knn: True
    knn_params:
      batch_size: 1536
      k: 20
      t: 0.07
  tsne:
    interactive: False
    num_patches: [8192]
    which_set: [val]
    embed_images: true
    class_params:
      perplexity: 50
      learning_rate: auto
      init : pca
tune:
  diagonal_items: true
  params:
    testing/ckpt_path:
    - 06a7dc26_Jul26-19-36-50_sd1000_lr0.01_uni_tune0/models/ckpt-epoch39-step15680-loss0.00.ckpt
    - 2b57ae43_Jul26-20-12-02_sd1000_lr0.00001_uni_tune3/models/ckpt-epoch39-step15680-loss0.00.ckpt
    - af546f1d_Jul26-19-36-48_sd1000_lr0.0001_uni_tune2/models/ckpt-epoch39-step15680-loss0.00.ckpt
    - ee9666af_Jul26-19-36-46_sd1000_lr0.001_uni_tune1/models/ckpt-epoch39-step15680-loss0.00.ckpt


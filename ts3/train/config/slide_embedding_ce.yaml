# @package _global_

defaults:
  - hydra

infra:
  seed: 1000
  log_dir: /nfs/turbo/umms-tocho-snr/exp/chengjia
  exp_name: ts3/silica_mil_ce
  comment: ce
  tune_comment: TODO
  float32_matmul_precision: medium

data:
  dataset_common: &dataset_common
    _target_: ts3.data.slide_dataset.SlideEmbeddingDataset
    embedding_root: /scratch/tocho_root/tocho0/chengjia/silica_ucsf/b1a0cbe3_k1024
    embedding_path_template: "{patient}-{mosaic}/{patient}-{mosaic}-cell_representations.pt"
    class_order: ["0", "1", "2", "3"]
  dataloader_common: &dataloader_common
    _target_: torch.utils.data.DataLoader
    _partial_: true
    collate_fn:
      _target_: ts3.data.collate.SlideEmbeddingMILCollator
    num_workers: 7
    pin_memory: false
    persistent_workers: true
  infinite_train_sampler: &infinite_train_sampler
    _target_: ts3.data.samplers.ShardedInfiniteEpochSampler
    _partial_: true
    shuffle: true
  splits:
    train:
      steps_per_epoch: 1250
      dataset:
        <<: *dataset_common
        slides_csv: /nfs/turbo/umms-tocho/code/chengjia/torchsrh2/ts2/utils/silica_eval/playground/data/ucsf_retrospective_train.csv
        balance_instance_class: true
      sampler: *infinite_train_sampler
      dataloader:
        <<: *dataloader_common
        batch_size: 8
        drop_last: true
    trainval:
      dataset:
        <<: *dataset_common
        slides_csv: /nfs/turbo/umms-tocho/code/chengjia/torchsrh2/ts2/utils/silica_eval/playground/data/ucsf_retrospective_val.csv
        balance_instance_class: false
      sampler: null
      dataloader:
        <<: *dataloader_common
        batch_size: 8
        shuffle: false
        drop_last: false

meta_arch:
  _target_: ts3.train.meta_arch.SlideABMILModule
  num_classes: 4
  criterion:
    _target_: ts3.train.meta_arch.CrossEntropyLoss
    _partial_: true
  model:
    _target_: ts3.train.meta_arch.MILOrdinalModel
    mil:
      _target_: ts3.train.meta_arch.GatedABMIL
      input_dim: 384
      hidden_dim: 256
      attention_dim: 128
      dropout: 0.5
    head:
      _target_: ts3.train.meta_arch.CrossEntropyHead
      input_dim: 256
      num_classes: ${meta_arch.num_classes}

  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 1.0e-4
    betas: [0.9, 0.999]
    eps: 1.0e-8
    weight_decay: 1.0e-4
    amsgrad: false
  scheduler:
    _target_: torchsrh.optim.cosine_schedule_warmup.get_cosine_schedule_with_warmup
    _partial_: true
    num_warmup_steps: ${int_div:${.num_training_steps},10}
    num_training_steps: ${int_mul:${trainer.max_epochs},${data.splits.train.steps_per_epoch}}
    num_cycles: 0.5

trainer:
  _target_: pytorch_lightning.Trainer
  default_root_dir: ${hydra:runtime.output_dir}

  accelerator: gpu
  devices: -1
  strategy: ddp
  use_distributed_sampler: false

  callbacks:
    - _target_: pytorch_lightning.callbacks.ModelCheckpoint
      dirpath: ${hydra:runtime.output_dir}/models
      filename: "epoch{epoch:02d}"
      monitor: val/loss
      mode: min
      save_last: true
      save_top_k: -1
      every_n_epochs: 1
    - _target_: pytorch_lightning.callbacks.LearningRateMonitor
      logging_interval: step
  logger:
    - _target_: pytorch_lightning.loggers.TensorBoardLogger
      save_dir: ${hydra:runtime.output_dir}
      name: tb
      version: ""
    - _target_: pytorch_lightning.loggers.CSVLogger
      save_dir: ${hydra:runtime.output_dir}
      name: csv
      version: ""
  max_epochs: 10
  log_every_n_steps: 10
  enable_progress_bar: true
  precision: 16-mixed
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1
